name: udder-app
services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: rlmsinclair/udder-app
    source_dir: /
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FFMPEG_PATH
        scope: RUN_TIME
        value: /usr/bin/ffmpeg
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    health_check:
      http_path: /heartbeat
    build_command: pip install -r requirements.txt
    run_command: python -m uvicorn app.server:app --host 0.0.0.0 --port 8000
    packages:
      - ffmpeg
